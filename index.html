<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baldų Specifikacija – INOA Studio Pro</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
<div class="app" id="app">

  <!-- ══════════════ SIDEBAR ══════════════ -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <span class="hamburger"></span>
    </button>

    <div class="sidebar-header">
      <div class="sidebar-logo">INOA Studio Pro</div>
      <div class="sidebar-sub">Professional Document Editor</div>
    </div>

    <!-- Theme Switcher -->
    <div class="theme-switcher">
      <button class="theme-btn" data-theme="light" title="Light theme">☀️</button>
      <button class="theme-btn" data-theme="warm" title="Warm theme">🌅</button>
      <button class="theme-btn active" data-theme="neutral" title="Neutral theme">🎨</button>
      <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
    </div>

    <!-- Language Switcher -->
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="lt">LT</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <div class="doc-meta">
      <label data-i18n="clientName">Kliento vardas</label>
      <input id="clientName" value="Žukauskų šeima" />
      <label data-i18n="projectName">Projektas</label>
      <input id="projectName" value="Vilniaus butas" />
      <label data-i18n="docDate">Data</label>
      <input id="docDate" value="2026 m. balandis" />
      <label data-i18n="preparedBy">Dizaineris</label>
      <input id="preparedBy" value="INOA Interior Studio" />
    </div>

    <!-- Budget Summary -->
    <div class="budget-summary" id="budgetSummary">
      <div class="budget-label" data-i18n="totalBudget">Iš viso</div>
      <div class="budget-amount">€ <span id="budgetTotal">0</span></div>
      <button class="budget-toggle" id="budgetToggle" data-i18n="showPrices">Rodyti kainas</button>
    </div>

    <!-- Search -->
    <div class="search-panel">
      <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Ieškoti..." 
        data-i18n-placeholder="search"
      />
      <button class="search-clear" id="searchClear" style="display: none;">✕</button>
    </div>

    <div class="nav-panel" id="navPanel">
      <h3 data-i18n="pages">Puslapiai</h3>
      <div id="navList"></div>
    </div>

    <div class="add-pages-panel">
      <h3 data-i18n="addPage">Pridėti puslapį</h3>
      <button class="add-page-btn-sm" data-action="addContentPage" data-i18n="addContentPage">+ Turinio puslapis</button>
      <button class="add-page-btn-sm" data-action="addSectionTitlePage" data-i18n="addSectionPage">+ Skyriaus titulas</button>
      <button class="add-page-btn-sm" data-action="addIndexPage" data-i18n="addIndexPage">+ Turinys</button>
      <button class="add-page-btn-sm" data-action="addThankYouPage" data-i18n="addThankYouPage">+ Padėkos puslapis</button>
    </div>

    <div class="sidebar-footer">
      <button class="btn-primary" id="generatePDF" data-i18n="generatePDF">Generuoti PDF</button>
      <button class="btn-primary" id="printBtn" data-i18n="print">Spausdinti</button>
      <div class="btn-group">
        <button class="btn-secondary" id="saveBtn" data-i18n="save">💾 Išsaugoti</button>
        <button class="btn-secondary" id="loadBtn" data-i18n="load">📂 Įkelti</button>
      </div>
      <div class="btn-group">
        <button class="btn-secondary" id="exportBtn" data-i18n="export">⬇️ Eksportuoti</button>
        <button class="btn-secondary" id="importBtn" data-i18n="import">⬆️ Importuoti</button>
      </div>
      <button class="btn-secondary" id="newDocBtn" data-i18n="newDoc">Naujas dokumentas</button>
      <div class="version-info">v2.0.0 Pro</div>
    </div>
  </div>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ══════════════ MAIN ══════════════ -->
  <div class="main" id="main">
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <button class="tool-btn" id="undoBtn" disabled title="Undo (Ctrl+Z)">
        <span>↶</span>
      </button>
      <button class="tool-btn" id="redoBtn" disabled title="Redo (Ctrl+Y)">
        <span>↷</span>
      </button>
      <div class="toolbar-divider"></div>
      <button class="tool-btn" id="templateBtn" title="Templates" data-i18n="templates">
        <span>📋</span>
      </button>
      <button class="tool-btn" id="galleryBtn" title="Image Gallery" data-i18n="gallery">
        <span>🖼️</span>
      </button>
      <div class="toolbar-spacer"></div>
      <div class="zoom-controls">
        <button class="tool-btn" id="zoomOut" title="Zoom out">−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="tool-btn" id="zoomIn" title="Zoom in">+</button>
      </div>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
      <div id="pagesContainer" class="pages-container"></div>
    </div>
  </div>

</div>

<!-- ══════════════ MODALS ══════════════ -->

<!-- Template Modal -->
<div class="modal" id="templateModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 data-i18n="chooseTemplate">Pasirinkite šabloną</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="templateList"></div>
  </div>
</div>

<!-- Gallery Modal -->
<div class="modal" id="galleryModal">
  <div class="modal-content modal-large">
    <div class="modal-header">
      <h2 data-i18n="imageGallery">Nuotraukų galerija</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </div>
</div>

<!-- Item Edit Modal -->
<div class="modal" id="itemEditModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 data-i18n="editItem">Redaguoti prekę</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="itemEditForm"></div>
  </div>
</div>

<!-- Hidden file input for import -->
<input type="file" id="importFileInput" accept=".json" style="display: none;" />

<!-- Toast notifications -->
<div class="toast-container" id="toastContainer"></div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay" style="display: none;">
  <div class="loading-spinner"></div>
  <div class="loading-text" data-i18n="loading">Kraunama...</div>
</div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/storage.js"></script>
<script src="js/history.js"></script>
<script src="js/utils.js"></script>
<script src="js/templates.js"></script>
<script src="js/imageUtils.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/export.js"></script>
<script src="js/print.js"></script>
<script src="js/app.js"></script>

</body>
</html>
